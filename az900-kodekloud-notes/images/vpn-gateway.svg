<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="630" viewBox="0 0 1240 630" role="img" aria-labelledby="title description">
  <title id="title">VPN Gateway</title>
  <desc id="description">An Azure VPN Gateway creates an encrypted VPN tunnel between an Azure virtual network and an on-premises gateway.</desc>
  <defs>
    <linearGradient id="network" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#d9a7cf"/>
      <stop offset="1" stop-color="#e8b49e"/>
    </linearGradient>
    <linearGradient id="azureGateway" x1="0" x2="1">
      <stop offset="0" stop-color="#e95548"/>
      <stop offset="1" stop-color="#eda52e"/>
    </linearGradient>
    <linearGradient id="onPremGateway" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#3c6bed"/>
      <stop offset="1" stop-color="#8b3ce9"/>
    </linearGradient>
    <linearGradient id="tunnel" x1="0" x2="1">
      <stop offset="0" stop-color="#32aa78"/>
      <stop offset="1" stop-color="#8cebac"/>
    </linearGradient>
  </defs>

  <rect width="1240" height="630" fill="#fff"/>
  <text x="6" y="43" fill="#292929" font-family="Arial, sans-serif" font-size="40">VPN Gateway</text>

  <g font-family="Arial, sans-serif">
    <rect x="115" y="164" width="454" height="52" rx="8" fill="#898989"/>
    <text x="129" y="198" fill="#fff" font-size="20"><tspan font-weight="bold">01</tspan><tspan> | Encrypted traffic gateway</tspan></text>
    <rect x="722" y="158" width="454" height="52" rx="8" fill="#898989"/>
    <text x="736" y="192" fill="#fff" font-size="20"><tspan font-weight="bold">02</tspan><tspan> | Azure-to-on-premises connection</tspan></text>

    <rect x="115" y="285" width="323" height="279" rx="14" fill="url(#network)"/>
    <text x="131" y="404" fill="#fff" font-size="25">
      <tspan x="131">Azure</tspan>
      <tspan x="131" dy="31">Virtual</tspan>
      <tspan x="131" dy="31">Network</tspan>
    </text>

    <rect x="854" y="285" width="322" height="279" rx="14" fill="url(#network)"/>
    <text x="1015" y="435" fill="#fff" font-size="25" text-anchor="middle">On-Premises</text>

    <rect x="476" y="396" width="298" height="57" fill="url(#tunnel)"/>
    <text x="625" y="433" fill="#fff" font-size="21" text-anchor="middle">Encrypted VPN Tunnel</text>

    <rect x="357" y="354" width="162" height="140" rx="13" fill="url(#azureGateway)"/>
    <text x="438" y="432" fill="#fff" font-size="20" text-anchor="middle">VPN Gateway</text>

    <rect x="773" y="354" width="162" height="140" rx="13" fill="url(#onPremGateway)"/>
    <text x="854" y="419" fill="#fff" font-size="20" text-anchor="middle">
      <tspan x="854">On-Premises</tspan>
      <tspan x="854" dy="25">Gateway</tspan>
    </text>
  </g>
</svg>
