<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="390" viewBox="0 0 1000 390" role="img" aria-labelledby="title description">
  <title id="title">Microsoft Entra ID and Azure RBAC</title>
  <desc id="description">Microsoft Entra ID authenticates an identity, while Azure RBAC determines which actions that identity can perform on Azure resources.</desc>
  <defs>
    <linearGradient id="one" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#e74c4c"/>
      <stop offset="1" stop-color="#eca52b"/>
    </linearGradient>
    <linearGradient id="two" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#dbafd7"/>
      <stop offset="1" stop-color="#e7a9b0"/>
    </linearGradient>
    <linearGradient id="three" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#37b77f"/>
      <stop offset="1" stop-color="#6edb99"/>
    </linearGradient>
  </defs>

  <rect width="1000" height="390" fill="#fff"/>
  <g font-family="Arial, sans-serif">
    <!-- Number arrows -->
    <g>
      <path d="M0 27 Q0 14 13 14 H38 L67 49 L38 84 H13 Q0 84 0 71 Z" fill="url(#one)"/>
      <text x="24" y="58" fill="#fff" font-size="23" font-weight="bold" text-anchor="middle">01</text>
    </g>
    <g transform="translate(0 137)">
      <path d="M0 27 Q0 14 13 14 H38 L67 49 L38 84 H13 Q0 84 0 71 Z" fill="url(#two)"/>
      <text x="24" y="58" fill="#fff" font-size="23" font-weight="bold" text-anchor="middle">02</text>
    </g>
    <g transform="translate(0 274)">
      <path d="M0 27 Q0 14 13 14 H38 L67 49 L38 84 H13 Q0 84 0 71 Z" fill="url(#three)"/>
      <text x="24" y="58" fill="#fff" font-size="23" font-weight="bold" text-anchor="middle">03</text>
    </g>

    <!-- Explanations -->
    <g fill="#707070" font-size="25">
      <text x="84" y="44">
        <tspan x="84">Azure RBAC protects Azure resources by defining who can do</tspan>
        <tspan x="84" dy="31">what and at which scope within the Azure environment.</tspan>
      </text>
      <text x="84" y="181">
        <tspan x="84">Microsoft Entra ID authenticates you and gets you signed in,</tspan>
        <tspan x="84" dy="31">but Azure RBAC authorizes Azure resource-management tasks.</tspan>
      </text>
      <text x="84" y="318">
        <tspan x="84">Entra ID verifies who you are; Azure RBAC determines which</tspan>
        <tspan x="84" dy="31">actions you are allowed to perform on Azure resources.</tspan>
      </text>
    </g>
  </g>
</svg>
