<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560" role="img" aria-labelledby="title description">
  <title id="title">Azure Service Health views</title>
  <desc id="description">Azure Service Health includes personalized Service Health information and individual Resource Health, while Azure Status provides a broad public view of Azure service availability.</desc>
  <defs>
    <linearGradient id="orange" x1="0" x2="1">
      <stop offset="0" stop-color="#df302f"/>
      <stop offset="1" stop-color="#e99728"/>
    </linearGradient>
    <linearGradient id="pink" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ca82bd"/>
      <stop offset="1" stop-color="#e5b7a5"/>
    </linearGradient>
    <linearGradient id="green" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#229e70"/>
      <stop offset="1" stop-color="#70e89f"/>
    </linearGradient>
  </defs>

  <rect width="1000" height="560" fill="#fff"/>
  <text x="4" y="43" fill="#292929" font-family="Arial, sans-serif" font-size="40">Azure Service Health</text>

  <g font-family="Arial, sans-serif">
    <!-- Three-part health symbol -->
    <path d="M106 266 C106 198 150 162 201 162 C238 162 268 182 290 207 C312 182 342 162 379 162 C430 162 474 198 474 266 Z" fill="url(#orange)"/>
    <path d="M108 286 H472 C467 331 440 366 404 402 H168 C132 366 113 331 108 286 Z" fill="url(#pink)"/>
    <path d="M188 422 H388 L305 508 Q290 524 275 508 Z" fill="url(#green)"/>

    <!-- Numbers -->
    <g fill="#fff" font-size="38" font-weight="bold" text-anchor="middle" style="paint-order:stroke;stroke:#777;stroke-width:3px;stroke-opacity:.55">
      <text x="414" y="239">01</text>
      <text x="405" y="354">02</text>
      <text x="290" y="482">03</text>
    </g>

    <!-- Connector lines -->
    <g fill="none" stroke="#707070" stroke-width="2.5">
      <path d="M451 217 H649"/>
      <path d="M439 337 H649"/>
      <path d="M340 455 H649"/>
    </g>
    <g fill="#707070">
      <circle cx="649" cy="217" r="5"/>
      <circle cx="649" cy="337" r="5"/>
      <circle cx="649" cy="455" r="5"/>
    </g>

    <!-- Labels -->
    <g fill="#5f5f5f" font-size="27" font-weight="bold">
      <text x="667" y="226">Azure Service Health</text>
      <text x="667" y="346">Azure Resource Health</text>
      <text x="667" y="464">Azure Status</text>
    </g>
  </g>
</svg>
