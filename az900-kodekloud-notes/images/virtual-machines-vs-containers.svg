<svg xmlns="http://www.w3.org/2000/svg" width="1340" height="630" viewBox="0 0 1340 630" role="img" aria-labelledby="title description">
  <title id="title">Virtual Machines vs Containers</title>
  <desc id="description">Virtual machines each include an application, libraries, and a guest operating system above a hypervisor. Containers include only an application and libraries above a shared container runtime. Both run on a host operating system and server.</desc>
  <defs>
    <linearGradient id="pink" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#d9a4cf"/>
      <stop offset="1" stop-color="#e4b7a5"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#27b7da"/>
      <stop offset="1" stop-color="#62e1cf"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" x2="1">
      <stop offset="0" stop-color="#4268ed"/>
      <stop offset="1" stop-color="#8d3fea"/>
    </linearGradient>
    <linearGradient id="green" x1="0" x2="1">
      <stop offset="0" stop-color="#2ca275"/>
      <stop offset="1" stop-color="#91ebb0"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" x2="1">
      <stop offset="0" stop-color="#e65347"/>
      <stop offset="1" stop-color="#eba533"/>
    </linearGradient>
  </defs>

  <rect width="1340" height="630" fill="#fff"/>
  <text x="14" y="55" fill="#2c2c2c" font-family="Arial, sans-serif" font-size="40">Virtual Machines vs Containers</text>

  <g font-family="Arial, sans-serif" text-anchor="middle">
    <g transform="translate(12 164)">
      <rect width="298" height="262" rx="10" fill="url(#pink)"/>
      <text x="149" y="32" fill="#fff" font-size="23">Virtual Machine</text>
      <g fill="#fff">
        <rect x="34" y="90" width="230" height="34" rx="6"/>
        <rect x="34" y="146" width="230" height="34" rx="6"/>
        <rect x="34" y="202" width="230" height="34" rx="6"/>
      </g>
      <g fill="#777" font-size="21">
        <text x="149" y="114">App A</text>
        <text x="149" y="170">Libraries / Binaries</text>
        <text x="149" y="226">Guest OS</text>
      </g>
    </g>

    <g transform="translate(330 164)">
      <rect width="298" height="262" rx="10" fill="url(#cyan)"/>
      <text x="149" y="32" fill="#fff" font-size="23">Virtual Machine</text>
      <g fill="#fff">
        <rect x="34" y="90" width="230" height="34" rx="6"/>
        <rect x="34" y="146" width="230" height="34" rx="6"/>
        <rect x="34" y="202" width="230" height="34" rx="6"/>
      </g>
      <g fill="#777" font-size="21">
        <text x="149" y="114">App B</text>
        <text x="149" y="170">Libraries / Binaries</text>
        <text x="149" y="226">Guest OS</text>
      </g>
    </g>

    <g transform="translate(681 241)">
      <rect width="298" height="185" rx="10" fill="url(#pink)"/>
      <text x="149" y="31" fill="#fff" font-size="23">Container</text>
      <g fill="#fff">
        <rect x="34" y="69" width="230" height="34" rx="6"/>
        <rect x="34" y="125" width="230" height="34" rx="6"/>
      </g>
      <g fill="#777" font-size="21">
        <text x="149" y="93">App A</text>
        <text x="149" y="149">Libraries / Binaries</text>
      </g>
    </g>

    <g transform="translate(998 241)">
      <rect width="298" height="185" rx="10" fill="url(#cyan)"/>
      <text x="149" y="31" fill="#fff" font-size="23">Container</text>
      <g fill="#fff">
        <rect x="34" y="69" width="230" height="34" rx="6"/>
        <rect x="34" y="125" width="230" height="34" rx="6"/>
      </g>
      <g fill="#777" font-size="21">
        <text x="149" y="93">App B</text>
        <text x="149" y="149">Libraries / Binaries</text>
      </g>
    </g>

    <rect x="12" y="440" width="616" height="42" rx="7" fill="url(#purple)"/>
    <text x="320" y="469" fill="#fff" font-size="24">Hypervisor</text>
    <rect x="681" y="440" width="615" height="42" rx="7" fill="url(#purple)"/>
    <text x="988" y="469" fill="#fff" font-size="24">Container Runtime</text>

    <rect x="12" y="496" width="1284" height="42" rx="7" fill="url(#green)"/>
    <text x="654" y="525" fill="#fff" font-size="24">Host OS</text>
    <rect x="12" y="553" width="1284" height="42" rx="7" fill="url(#orange)"/>
    <text x="654" y="582" fill="#fff" font-size="24">Server</text>
  </g>
</svg>
